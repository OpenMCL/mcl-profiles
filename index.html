<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCL Profiles</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <h1>MCL</h1>
        <p class="subtitle">MCL 資深工程師</p>
      </header>

      <main class="wall">
        <div class="card">
          <img class="avatar" src="assets/photos/good.jpg" alt="Demo" />
          <h2 class="name">我是誰</h2>
          <p class="bio">我是範例，請參考 README 開始你的第一個 PR！</p>
          <div class="tags">
            <span class="tag">Git 大神</span><span class="tag">範例工程師</span>
          </div>
          <a href="profiles/template" class="view-btn">查看完整簡介</a>
        </div>

        <div class="card">
          <img class="avatar" src="assets/photos/good.jpg" alt="Demo" />
          <h2 class="name">我是小馬</h2>
          <p class="bio">我是範例，請參考 README 開始你的第一個 PR！</p>
          <div class="tags">
            <span class="tag">Git 大神</span><span class="tag">資深工程師</span>
          </div>
          <a href="profiles/arthur" class="view-btn">查看完整簡介</a>
        </div>
        
        <!-- Luke -->
        <div class="card">
          <img class="avatar" src="assets/photos/luke.svg" alt="Demo" />
          <h2 class="name">Luke</h2>
          <p class="bio">我第一次發 PR</p>
          <div class="tags">
            <span class="tag">Git 新手</span><span class="tag">初階工程師</span>
          </div>
          <a href="profiles/luke" class="view-btn">查看完整簡介</a>
        </div>
        
        <div class="card" 
             style="position: relative; overflow: hidden; border: 1px solid rgba(99, 102, 241, 0.4); box-shadow: 0 0 15px rgba(99, 102, 241, 0.15); transition: all 0.3s ease;" 
             onmouseover="this.style.boxShadow='0 0 25px rgba(99, 102, 241, 0.6)'; this.style.transform='translateY(-5px)';" 
             onmouseout="this.style.boxShadow='0 0 15px rgba(99, 102, 241, 0.15)'; this.style.transform='translateY(0)';">
          
          <div style="position: absolute; top: -40px; right: -40px; width: 100px; height: 100px; background: #6366f1; filter: blur(50px); opacity: 0.4; pointer-events: none;"></div>

          <img class="avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Duan" alt="段祺瑞" style="border: 2px solid #6366f1; padding: 2px;" />
          <h2 class="name" style="text-shadow: 0 0 8px rgba(99, 102, 241, 0.8);">段祺瑞</h2>
          <p class="bio">好想睡覺，看到幫我打吳春辰一下</p>
          
          <div class="tags">
            <span class="tag" style="background: rgba(99, 102, 241, 0.15); border: 1px solid #6366f1; color: #818cf8;">修仙中</span>
            <span class="tag" style="background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #f87171;">對吳春辰武裝部隊</span>
          </div>
          
          <a href="profiles/rayhuang.html" class="view-btn" style="background: linear-gradient(90deg, #6366f1, #a855f7); border: none; color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);">進入星際觀測站</a>
        </div>
        <!-- Leo -->
        <div class="card">
          <img class="avatar" src="assets/photos/leo.jpg" alt="Demo" />
          <h2 class="name">我是林柏燁</h2>
          <p class="bio">我是範例，請參考 README 開始你的第一個 PR！</p>
          <div class="tags">
            <span class="tag">菜雞</span>
          </div>
          <a href="profiles/leo.html" class="view-btn">查看不完整簡介</a>

        </div>

        <!-- MEMBER_CARDS_END -->
      </main>

      <footer>
        <p>Made by MCL</p>
      </footer>
    </div>
  </body>
</html>
