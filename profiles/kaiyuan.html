<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>個人頁面模板</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="profile-page">

  <a href="../index.html" class="back-btn">回到首頁</a>

  <!-- 個人頁面的大標題與內容 -->
  <header class="profile-header">
    <img class="avatar" src="../assets/photos/good.jpg" alt="頭像">
    <div class="profile-info">
      <h1>我是誰</h1>
      <p>我喜歡寫程式，也喜歡打程式，還喜歡寫程式！</p>
    </div>
  </header>

  <!-- 有趣但沒意義的小東西 -->
  <section class="useless-box">
    <h4>工程師修仙進度</h4>
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
    <p style="font-size: 0.7rem; color: #9CA3AF;">距離成為大神還差 1% (預計耗時 50 年)</p>

    <div class="luck-card" title="點擊重新整理獲取新運勢">
      今日運勢：<span>大吉 (宜寫 Code)</span>
    </div>

    <button class="boring-btn" onclick="alert('都說沒用了你還點！')">這是一個沒用的按鈕</button>
  </section>

</body>
</html>
